[package]
name = "harn-sourcehut-connector"
version = "0.1.0"
description = "SourceHut connector written in Harn: Ed25519 webhook verification plus GraphQL and raw HTTP helpers."
license = "MIT OR Apache-2.0"
repository = "https://github.com/burin-labs/harn-sourcehut-connector"
connector_contract = "v1"

[exports]
default = "src/lib.harn"

[[providers]]
id = "sourcehut"
connector = { harn = "src/lib.harn" }
capabilities = ["webhook", "rate_limit", "pagination", "graphql"]

[providers.setup]
auth_type = "api-key"
flow = "cli"
required_secrets = ["sourcehut/api-token", "sourcehut/webhook-public-key"]
setup_command = ["harn", "connect", "api-key", "--connector", "sourcehut", "--secret-id", "sourcehut/api-token"]
validation_command = ["harn", "connect", "status", "--connector", "sourcehut", "--json"]

[[providers.setup.health_checks]]
id = "api-token"
kind = "secret"
secret = "sourcehut/api-token"

[[providers.setup.health_checks]]
id = "webhook-public-key"
kind = "secret"
secret = "sourcehut/webhook-public-key"

[providers.setup.recovery]
missing_auth = "Store sourcehut/api-token and sourcehut/webhook-public-key before enabling SourceHut bindings."
expired_credentials = "Rotate sourcehut/api-token, then rerun SourceHut connection validation."
revoked_credentials = "Replace sourcehut/api-token with an active SourceHut OAuth or personal access token."
missing_scopes = "Grant GraphQL, repository, and webhook scopes required by the configured SourceHut workflows."
inaccessible_resource = "Confirm the token can access the target SourceHut account and repository."
transient_provider_outage = "Retry after SourceHut API and webhook delivery endpoints are healthy."

[dependencies]

[connector_contract]
version = 1

[[connector_contract.fixtures]]
provider = "sourcehut"
name = "happy path"
kind = "webhook"
headers = { "x-sourcehut-event" = "repo.push", "x-sourcehut-delivery" = "delivery-1" }
body_json = { event = "repo.push", repository = { name = "~ada/widgets" }, pusher = { canonical_name = "~ada" }, commits = [{ id = "abc123" }] }
expect_type = "event"
expect_kind = "repo.push"
expect_signature_state = "unsigned"
expect_event_count = 1
expect_payload_contains = { provider = "sourcehut", raw = { event = "repo.push" } }

[[connector_contract.fixtures]]
provider = "sourcehut"
name = "git post receive enum"
kind = "webhook"
body_json = { webhook = { uuid = "delivery-2", event = "GIT_POST_RECEIVE" }, repository = { rid = "repo-1", name = "widgets", repoPath = "~ada/widgets" } }
expect_type = "event"
expect_kind = "git.post_receive"
expect_dedupe_key = "sourcehut:git.post_receive:delivery-2"
expect_signature_state = "unsigned"
expect_event_count = 1
expect_payload_contains = { provider = "sourcehut", raw = { delivery_id = "delivery-2", repository = { id = "repo-1", full_name = "~ada/widgets" } } }

[[connector_contract.fixtures]]
provider = "sourcehut"
name = "ticket created enum"
kind = "webhook"
body_json = { webhook = { uuid = "ticket-1", event = "TICKET_CREATED", date = "2026-05-22T09:30:00Z", ticket = { id = 42, subject = "Fix widgets" } }, submitter = { canonical_name = "~ada" } }
expect_type = "event"
expect_kind = "ticket.created"
expect_dedupe_key = "sourcehut:ticket.created:ticket-1"
expect_signature_state = "unsigned"
expect_event_count = 1
expect_payload_contains = { provider = "sourcehut", raw = { event = "ticket.created", resource = { id = 42, subject = "Fix widgets" }, actor = { username = "~ada" } } }

[[connector_contract.fixtures]]
provider = "sourcehut"
name = "build job updated enum"
kind = "webhook"
body_json = { webhook = { uuid = "job-1", event = "JOB_UPDATED", date = "2026-05-22T09:31:00Z" }, job = { id = 7, status = "SUCCESS" } }
expect_type = "event"
expect_kind = "build.updated"
expect_dedupe_key = "sourcehut:build.updated:job-1"
expect_signature_state = "unsigned"
expect_event_count = 1
expect_payload_contains = { provider = "sourcehut", raw = { event = "build.updated", resource = { id = 7, status = "SUCCESS" } } }

[[connector_contract.fixtures]]
provider = "sourcehut"
name = "unsupported prefix event"
kind = "webhook"
body_json = { event = "repo.push_extra" }
expect_type = "reject"
expect_response_status = 400
expect_event_count = 0

[[connector_contract.fixtures]]
provider = "sourcehut"
name = "malformed payload"
kind = "webhook"
headers = { "x-sourcehut-event" = "repo.push" }
body = "{not json"
expect_type = "reject"
expect_response_status = 400
expect_event_count = 0
